<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hamidov Sherzodbek</title>
  <meta name="description" content="Hamidov Sherzodbek — shaxsiy sahifa: qisqa tanishtiruv va kontakt linklar." />

  <style>
    :root{
      --bg:#050607;
      --glass: rgba(16,18,22,.55);
      --glass2: rgba(16,18,22,.42);
      --line: rgba(255,255,255,.10);
      --line2: rgba(255,255,255,.14);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.68);
      --muted2: rgba(255,255,255,.52);
      --shadow: 0 22px 80px rgba(0,0,0,.62);
      --radius: 22px;
      --radius2: 16px;
      --max: 1120px;
    }

    *{ box-sizing:border-box; }
    html{ scroll-behavior:smooth; }
    body{
      margin:0;
      color:var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: var(--bg);
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      z-index:-2;
      background:
        radial-gradient(1100px 700px at 50% 20%, rgba(255,255,255,.08), transparent 55%),
        radial-gradient(900px 650px at 15% 35%, rgba(255,255,255,.06), transparent 55%),
        radial-gradient(900px 650px at 85% 40%, rgba(255,255,255,.05), transparent 55%),
        url("bg.jpg");
      background-size: cover;
      background-position: center;
      background-repeat:no-repeat;
      filter: contrast(1.05) saturate(1.05);
      transform: scale(1.02);
    }
    body::after{
      content:"";
      position:fixed;
      inset:0;
      z-index:-1;
      background: linear-gradient(to bottom, rgba(0,0,0,.70), rgba(0,0,0,.78) 35%, rgba(0,0,0,.86));
      pointer-events:none;
    }

    a{ color:inherit; text-decoration:none; }

    .wrap{
      width:min(var(--max), 100%);
      margin:0 auto;
      padding: 0 18px;
    }

    .nav{
      position:sticky;
      top:0;
      z-index:50;
      border-bottom:1px solid var(--line);
      background: rgba(0,0,0,.28);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .nav-in{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding: 8px 0;
    }
    .nav-left{
      display:flex;
      align-items:center;
      gap:10px;
      min-width: 0;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:850;
      letter-spacing:.2px;
      white-space:nowrap;
    }
    .brand .dot{
      width:10px;height:10px;border-radius:999px;
      background: rgba(255,255,255,.95);
      box-shadow: 0 0 0 7px rgba(255,255,255,.10);
    }

    .menu{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    .menu a{
      color: var(--muted);
      font-weight: 750;
      font-size: 13.5px;
      padding: 8px 10px;
      border-radius: 999px;
      transition: .18s ease;
      outline: none;
    }
    .menu a:hover{
      color: var(--text);
      background: rgba(255,255,255,.06);
    }
    .menu a:focus-visible{
      color: var(--text);
      box-shadow: 0 0 0 3px rgba(255,255,255,.16);
      background: rgba(255,255,255,.06);
    }

    .phone-pill{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding: 8px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.06);
      color: var(--text);
      font-weight:850;
      transition: .18s ease;
      outline: none;
    }
    .phone-pill:hover{ background: rgba(255,255,255,.10); transform: translateY(-1px); }
    .phone-pill:focus-visible{ box-shadow: 0 0 0 3px rgba(255,255,255,.16); }
    .phone-pill .p-ic{
      width: 30px;
      height: 30px;
      border-radius: 999px;
      display:grid;
      place-items:center;
      background: rgba(0,0,0,.22);
      border: 1px solid rgba(255,255,255,.12);
      flex: 0 0 auto;
    }
    .phone-pill svg{ width:18px; height:18px; opacity:.92; }

    .phone-pill svg{ width:18px; height:18px; opacity:.92; }

    .views{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding: 8px 12px;
      border-radius: 999px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.06);
      color: var(--muted);
      font-weight: 850;
      font-size: 13px;
      white-space: nowrap;
    }
    .views-dot{
      width:8px;height:8px;border-radius:999px;
      background: rgba(255,255,255,.85);
      box-shadow: 0 0 0 6px rgba(255,255,255,.10);
    }
    .views #viewsNum{ color: var(--text); }
    .views-label{ color: var(--muted2); font-weight: 800; }

    @media (max-width:560px){
      .views{ display:none; }
    }

    .hero{
      padding: 54px 0 22px;
      min-height: 68vh;
      display:grid;
      place-items:center;
    }
    .hero-card{
      width:100%;
      border:1px solid var(--line);
      border-radius: 28px;
      background: linear-gradient(180deg, var(--glass), rgba(16,18,22,.28));
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      overflow:hidden;
      position:relative;
    }
    .hero-card::before{
      content:"";
      position:absolute;
      inset:-120px -120px auto auto;
      width: 320px; height: 320px;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.18), transparent 60%);
      transform: rotate(18deg);
      pointer-events:none;
    }
    .hero-in{
      padding: 34px 22px 28px;
      display:grid;
      justify-items:center;
      text-align:center;
      gap: 12px;
    }
    .avatar{
      width: 120px;
      height: 120px;
      border-radius:999px;
      object-fit:cover;
      border: 2px solid rgba(255,255,255,.85);
      box-shadow: 0 18px 60px rgba(0,0,0,.65);
      background: rgba(0,0,0,.25);
    }
    h1{
      margin: 6px 0 0;
      font-size: 52px;
      line-height: 1.05;
      letter-spacing: -1px;
    }
    @media (max-width:560px){
      h1{ font-size: 38px; }
      .hero{ padding-top: 46px; }
    }
    .meta{
      color: var(--muted);
      font-weight: 700;
      font-size: 14px;
    }
    .desc{
      margin: 0;
      max-width: 78ch;
      color: var(--muted);
      line-height: 1.7;
      font-size: 15.5px;
    }
    .tags{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:center;
      margin-top: 6px;
    }
    .tag{
      padding: 9px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.18);
      color: var(--muted);
      font-weight: 750;
      font-size: 13px;
      letter-spacing: .1px;
    }

    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      justify-content:center;
      margin-top: 10px;
    }
    .btn{
      position:relative;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding: 14px 18px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.06);
      color: var(--text);
      font-weight: 900;
      font-size: 14px;
      transition: .18s ease;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
      overflow:hidden;
      outline: none;
      isolation: isolate;
    }
    .btn:hover{ background: rgba(255,255,255,.10); transform: translateY(-2px); }
    .btn:active{ transform: translateY(0); }
    .btn:focus-visible{
      box-shadow: 0 0 0 3px rgba(255,255,255,.18);
      background: rgba(255,255,255,.10);
    }
    .btn svg{ opacity:.95; }

    .btn::before{
      content:"";
      position:absolute;
      top:0;
      left:-120%;
      width:60%;
      height:100%;
      background: linear-gradient(
        110deg,
        transparent 0%,
        rgba(255,255,255,.10) 40%,
        rgba(255,255,255,.28) 50%,
        rgba(255,255,255,.10) 60%,
        transparent 100%
      );
      transform: skewX(-18deg);
      pointer-events:none;
      z-index:0;
    }
    .btn:hover::before{ animation: shimmerMove .85s ease-out forwards
; }
    @keyframes shimmerMove{ 0%{ left:-120%; } 100%{ left:130%; } }

    .btn svg{ width:20px; height:20px; }

    .ripple{
      position:absolute;
      border-radius:999px;
      transform: translate(-50%, -50%);
      background: rgba(255,255,255,.32);
      animation: ripple .55s ease-out;
      pointer-events:none;
      z-index:1;
    }
    @keyframes ripple{
      from{ width: 0; height: 0; opacity: .55; }
      to{ width: 420px; height: 420px; opacity: 0; }
    }
    @media (hover: none){
      .ripple{ background: rgba(255,255,255,.22); }
      .btn:hover{ transform:none; }
    }

    section{ padding: 52px 0; }

    .section-title{
      text-align:center;
      margin: 0 0 10px;
      font-size: 40px;
      letter-spacing: -.7px;
    }
    .section-sub{
      text-align:center;
      margin: 0 auto 22px;
      max-width: 78ch;
      color: var(--muted);
      line-height: 1.75;
      font-size: 15px;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }
    @media (max-width:980px){
      .grid{ grid-template-columns: 1fr; }
    }

    .card{
      border:1px solid var(--line);
      background: linear-gradient(180deg, var(--glass2), rgba(16,18,22,.18));
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 18px;
      transition: .18s ease;
    }
    .card:hover{ transform: translateY(-2px); border-color: var(--line2); }

    .card-top{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom: 10px;
    }

    .ic{
      width: 44px; height: 44px;
      border-radius: 14px;
      display:grid;
      place-items:center;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.18);
      flex: 0 0 auto;
    }
    .ic svg{ width: 22px; height: 22px; opacity:.92; }

    .card h3{
      margin:0;
      font-size: 18px;
      letter-spacing: -.2px;
    }
    .card p{
      margin: 0;
      color: var(--muted);
      line-height: 1.75;
      font-size: 14.8px;
    }

    .bullets{
      margin: 12px 0 0;
      padding: 0;
      list-style:none;
      display:grid;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }
    .bullets li{
      display:flex;
      gap:10px;
      align-items:flex-start;
    }
    .bullets li::before{
      content:"";
      width:6px;height:6px;border-radius:999px;
      margin-top: 8px;
      background: rgba(255,255,255,.72);
      flex: 0 0 auto;
      box-shadow: 0 0 0 6px rgba(255,255,255,.08);
    }

    .travel-grid{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-top: 18px;
    }
    @media (max-width:980px){
      .travel-grid{ grid-template-columns: 1fr; }
    }
    .flagline{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom: 10px;
    }
    .flag{
      width: 46px; height: 46px;
      border-radius: 16px;
      display:grid;
      place-items:center;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.18);
      font-size: 22px;
      box-shadow: 0 12px 44px rgba(0,0,0,.45);
      flex: 0 0 auto;
    }
    .flagmeta{
      display:grid;
      gap:2px;
    }
    .flagmeta .country{
      font-weight: 900;
      letter-spacing: -.2px;
    }
    .flagmeta .cities{
      color: var(--muted2);
      font-weight: 750;
      font-size: 13px;
    }

    .cta-box{
      border:1px solid var(--line);
      border-radius: 26px;
      background: linear-gradient(180deg, var(--glass), rgba(16,18,22,.22));
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      padding: 46px 18px;
      text-align:center;
    }
    .cta-box h2{
      margin:0 0 10px;
      font-size: 38px;
      letter-spacing: -.7px;
    }
    @media (max-width:560px){
      .cta-box h2{ font-size: 30px; }
    }
    .cta-box p{
      margin: 0 auto 18px;
      max-width: 82ch;
      color: var(--muted);
