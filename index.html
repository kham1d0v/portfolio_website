<!doctype html>
<html lang="uz">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Hamidov Sherzodbek</title>
<style>
:root{
--bg:#070A10;
--card:rgba(255,255,255,.06);
--line:rgba(255,255,255,.10);
--text:#EAF0FF;
--muted:rgba(234,240,255,.72);
--shadow:0 18px 50px rgba(0,0,0,.55);
--radius:18px;
}
*{box-sizing:border-box}
body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
background:
radial-gradient(900px 500px at 20% 10%, rgba(255,255,255,.06), transparent 60%),
radial-gradient(700px 400px at 80% 20%, rgba(255,255,255,.04), transparent 55%),
var(--bg);
color:var(--text);
min-height:100vh;
display:grid;
place-items:center;
padding:26px 14px;
}
.wrap{width:min(680px,100%)}
.card{
border:1px solid var(--line);
background:var(--card);
border-radius:var(--radius);
box-shadow:var(--shadow);
padding:28px 20px;
text-align:center;
backdrop-filter:blur(10px);
}
.avatar{
width:140px;
height:140px;
border-radius:50%;
object-fit:cover;
border:3px solid rgba(255,255,255,.85);
box-shadow:0 12px 30px rgba(0,0,0,.55);
display:block;
margin:0 auto 16px;
}
h1{
margin:0;
font-size:36px;
letter-spacing:-.6px;
}
.sub{
margin:12px auto 0;
color:var(--muted);
max-width:55ch;
line-height:1.6;
font-size:15px;
}
.btns{
margin-top:20px;
display:flex;
gap:12px;
flex-wrap:wrap;
justify-content:center;
}
.btn{
display:inline-flex;
align-items:center;
justify-content:center;
padding:13px 18px;
border-radius:14px;
border:1px solid rgba(255,255,255,.14);
background:rgba(0,0,0,.25);
color:var(--text);
text-decoration:none;
font-weight:800;
font-size:14px;
transition:.2s;
min-width:160px;
}
.btn:hover{
transform:translateY(-2px);
background:rgba(255,255,255,.08);
}
.footer{
margin-top:16px;
text-align:center;
color:rgba(234,240,255,.55);
font-size:12px;
}
@media(max-width:420px){
h1{font-size:28px}
.btn{min-width:100%}
}
</style>
</head>

<body>
<main class="wrap">
<section class="card">

<img class="avatar" src="profile.jpg" alt="Hamidov Sherzodbek" />

<h1>Hamidov Sherzodbek</h1>

</body>
</html>
